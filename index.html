<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Signup Form</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="background">
		<img src="images/ishikawa-spike.jpeg" alt="ishikawa-spike">
		<div class="signup">
			<h1>ODIN VOLLEYBALL CLUB</h1>
			<form method="post" class="question-form">
				<div class="member-name form-row">
					<label for="fname">First Name: </label>
					<input type="text" id="fname" name="fname">
					<label for="lname">Last Name: </label>
					<input type="text" id="lname" name="lname">
				</div>
				<div class="form-row">
					<label for="email">Email: </label>
					<input type="email" name="email" id="email">
				</div>
				<div class="form-row">
					<label for="password1">Password: </label>
					<input type="password" name="password1" id="password1">
				</div>
				<div class="form-row">
					<label for="password2">Confirm Password: </label>
					<input type="password" name="password2" id="password2">
				</div>
				<div class="member-info form-row">
					<div class="member-age">
						<label for="age">Age: </label>
						<input type="number" name="age" id="age">
					</div>
					<div class="member-gender">
						<label for="gender">Gender: </label>
						<select name="gender" id="gender">
							<option value="male">Male</option>
							<option value="female">Female</option>
							<option value="other">Other</option>
						</select>
					</div>
				</div>
				<div class="member-skill form-row">
					<p>Skill Level</p>
					<div class="member-skill">
						<input type="radio" name="skill-level" id="beginner">
						<label for="beginner">Beginner</label>
					</div>
					<div class="member-skill">
						<input type="radio" name="skill-level" id="intermediate">
						<label for="intermediate">Intermediate</label>
					</div>
					<div class="member-skill">
						<input type="radio" name="skill-level" id="advanced">
						<label for="advanced">Advanced</label>
					</div>
				</div>
				<div class="submit-button form-row">
					<button type="submit">Submit</button>
				</div>
			</form>
		</div>
	</div>
</body>

</html>
